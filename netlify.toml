[build]
  publish = "."
  functions = "netlify/functions"

# Explicitly allow this site to be embedded in an iframe on your Moodle domain.
# REPLACE the URL below with your actual Moodle site's origin (scheme + domain, no trailing slash),
# e.g. https://moodle.myuniversity.ac.za
# If you serve Moodle from more than one domain, list them all separated by spaces.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://learngibs.org"
